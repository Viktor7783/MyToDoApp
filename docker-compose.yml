# docker-compose.yml для приложения MyToDoApp
# Используется вместе с Dockerfile (многостадийная сборка: gradle -> tomcat)

# Определение томов (volumes) для хранения данных вне контейнеров
volumes:
  mysql_data:    # Том для сохранения данных MySQL (чтобы БД не сбрасывалась при перезапуске)

# Секция services описывает все контейнеры, которые будут запущены
services:
  # ---------- Сервис базы данных MySQL ----------
  db:
    image: mysql:8.4                # Официальный образ MySQL версии 8.4
    container_name: mytodoapp-db    # Имя контейнера (удобно для обращения)
    environment: # Переменные окружения, которые MySQL ждёт при первом запуске
      MYSQL_DATABASE: MyToDoApp     # Имя базы данных, которую создать автоматически
      MYSQL_ROOT_PASSWORD: 12345    # Пароль для root (не для продакшена!)
    ports:
      - "3306:3306"                 # Проброс порта: хост:контейнер (чтобы можно было подключиться извне) слева порт на твоём компьютере, справа порт в контейнере
    volumes:
      - mysql_data:/var/lib/mysql   # Монтируем том mysql_data в папку данных MySQL (сохранность данных)
    healthcheck: # Проверка, что БД действительно готова принимать запросы
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-p12345" ]  # Команда проверки
      interval: 5s                  # Проверять каждые 5 секунд
      timeout: 5s                   # Таймаут одной проверки
      retries: 20                   # Сколько раз пробовать, прежде чем признать сервис unhealthy

  # ---------- Сервис миграций (Liquibase) ----------
  # Запускается один раз, чтобы обновить схему БД до актуального состояния
  migrate:
    image: gradle:8.10.2-jdk21      # Образ с Gradle и JDK (такой же, как в первой стадии Dockerfile)
    container_name: mytodoapp-migrate
    working_dir: /workspace          # Рабочая директория внутри контейнера
    depends_on:
      db:
        condition: service_healthy   # Ждать, пока БД станет здоровой (healthcheck пройден)
    command: [ "gradle", "liquibaseUpdate", "--no-daemon" ]  # Команда, запускаемая при старте контейнера
    environment: # Переменные, которые нужны Liquibase (из вашего gradle.properties или build.gradle)
      DB_URL: jdbc:mysql://db:3306/MyToDoApp?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: 12345
    volumes:
      - ./:/workspace                # Монтируем текущую папку проекта (где лежит build.gradle и ченджлоги) в /workspace
    restart: "no"                    # Не перезапускать после завершения (миграция должна выполниться один раз)

  # ---------- Основное приложение (Tomcat + war) ----------
  app:
    build: # Сборка образа из Dockerfile
      context: .                     # Контекст сборки — текущая папка
      dockerfile: Dockerfile         # Имя Dockerfile (можно не указывать, если он называется Dockerfile)
    container_name: mytodoapp-app
    depends_on:
      db:
        condition: service_healthy   # Ждём здоровую БД
      migrate:
        condition: service_completed_successfully  # Ждём успешного завершения миграции
    environment:
      # Те же переменные подключения к БД (ваше приложение их должно читать, например, через System.getenv)
      DB_URL: jdbc:mysql://db:3306/MyToDoApp?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: 12345
    ports:
      - "8080:8080"                  # Проброс порта Tomcat на хост


# Комментарии:
# Два мира mysql_data: и /var/lib/mysql
#   1. Внутри контейнера (там, где работает MySQL):
#    Путь /var/lib/mysql — это папка внутри контейнера. Туда MySQL по умолчанию складывает свои файлы (базы данных, таблицы и т.д.).
#   2. На вашем компьютере (на хосте, в Linux):
#    Docker создаёт специальную папку для хранения данных тома. По умолчанию это /var/lib/docker/volumes/mysql_data/_data. Это физическое место на вашем жёстком диске.
#   данные БД хранятся в Docker volume; если контейнер удалить - данные сохранятся!

#  DB_URL содержит адрес контейнера db (db:3306), имя базы данных (MyToDoApp) и дополнительные параметры.
#  DB_USERNAME и DB_PASSWORD — учётные данные для доступа.
# volumes:
#  - ./:/workspace   (Монтирование — это не копирование, а прозрачный мост между хостом и контейнером.)
#  Эта команда не копирует вашу папку проекта внутрь контейнера. Вместо этого она говорит Docker:
#  «Сделай так, чтобы папка /workspace внутри контейнера показывала то же самое содержимое, что и папка ./ на моём компьютере.
# Если я изменю файл у себя на компе — он сразу изменится внутри контейнера. Если контейнер что-то запишет в /workspace — я увижу это у себя на компе.»

# Где выполняется ваш код? Сам код (исходники, build.gradle, ченджлоги) лежит на вашем компьютере.
# Когда вы запускаете docker-compose up, Docker создаёт контейнеры. Внутри каждого контейнера — своя минимальная ОС (Linux).
# Контейнеры изолированы от вашего компьютера и друг от друга, если явно не разрешить общение.
# Контейнеры видят ваш код только через монтирование (например, ./:/workspace).
# Они не копируют код, а получают к нему «окошко»: любое изменение файла на хосте сразу видно внутри контейнера, и наоборот.

# Всё, что делает ваше приложение (Tomcat, база данных, миграции), работает внутри контейнеров.
# Каждый сервис (db, migrate, app) — это отдельный контейнер со своей изолированной ОС и процессами.
# База данных MySQL запущена в контейнере db.
# Liquibase выполняет миграции в контейнере migrate.
# Ваше веб-приложение (Tomcat + war) работает в контейнере app.
# Но есть важный нюанс:
# Исходный код (ваши .java файлы, build.gradle, ченджлоги) лежит на вашем компьютере, но контейнер migrate видит его через монтирование (./:/workspace).
# Том mysql_data физически хранится на вашем компьютере, но контейнер db работает с ним как со своей внутренней папкой.
# Таким образом, вы управляете всем с вашего компьютера, а все вычисления и сервисы исполняются внутри контейнеров. Это и есть смысл контейнеризации.

# 1. Пересобрать образ приложения и перезапустить контейнер (Если менял классы и код): docker-compose up -d --build app
# 2. Если нужно также применить миграции (например, вы добавили новую колонку в БД): docker-compose up -d --force-recreate migrate
# 3. Проверить логи: docker-compose logs -f app